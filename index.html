<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flourish Dice Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --dice-size: 85px;
            --pip-size: 15px;
            --flourish-green: #C1FF72;
            --flourish-pink: #FF66C4;
            --bg-dark: #05472A;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            color: white;
        }

    
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            height: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        .logo-image { 
            max-width: 220px; 
            width: 60%; 
            height: auto;
        }

        .reset-btn {
            padding: 6px 20px;
            background-color: var(--flourish-pink);
            color: white;
            border-radius: 99px;
            font-weight: bold;
            font-size: 0.7rem;
            text-transform: uppercase;
            border: none;
            box-shadow: 0 4px 0 #b33a80;
        }

        .pos-display {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 18px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .adjust-btn {
            background: rgba(255, 255, 255, 0.2);
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
        }

        #message-box {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--flourish-green);
            text-align: center;
        }

    
        .scene { 
            width: var(--dice-size); 
            height: var(--dice-size); 
            perspective: 600px; 
        }
        
        .cube { 
            width: 100%; height: 100%; 
            position: relative; 
            transform-style: preserve-3d; 
            transition: transform 1.8s cubic-bezier(0.2, 0.8, 0.3, 1); 
        }

        .cube__face { 
            position: absolute; 
            width: var(--dice-size); height: var(--dice-size); 
            background: white; border: 2px solid #ddd; border-radius: 12px; 
            display: grid; grid-template-areas: "a . b" "c d e" "f . g"; 
            grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); 
            padding: 8px; backface-visibility: hidden; 
        }

        .pip { 
            display: block; width: var(--pip-size); height: var(--pip-size); 
            border-radius: 50%; background-color: #111; 
            justify-self: center; align-self: center; 
        }

     
        .face-1 { transform: rotateY(0deg) translateZ(42.5px); }
        .face-2 { transform: rotateY(90deg) translateZ(42.5px); }
        .face-3 { transform: rotateY(180deg) translateZ(42.5px); }
        .face-4 { transform: rotateY(-90deg) translateZ(42.5px); }
        .face-5 { transform: rotateX(90deg) translateZ(42.5px); }
        .face-6 { transform: rotateX(-90deg) translateZ(42.5px); }

        .face-1 .pip { grid-area: d; }
        .face-2 .pip:nth-child(1) { grid-area: a; } .face-2 .pip:nth-child(2) { grid-area: g; }
        .face-3 .pip:nth-child(1) { grid-area: a; } .face-3 .pip:nth-child(2) { grid-area: d; } .face-3 .pip:nth-child(3) { grid-area: g; }
        .face-4 .pip:nth-child(1) { grid-area: a; } .face-4 .pip:nth-child(2) { grid-area: b; } .face-4 .pip:nth-child(3) { grid-area: f; } .face-4 .pip:nth-child(4) { grid-area: g; }
        .face-5 .pip:nth-child(1) { grid-area: a; } .face-5 .pip:nth-child(2) { grid-area: b; } .face-5 .pip:nth-child(3) { grid-area: d; } .face-5 .pip:nth-child(4) { grid-area: f; } .face-5 .pip:nth-child(5) { grid-area: g; }
        .face-6 .pip:nth-child(1) { grid-area: a; } .face-6 .pip:nth-child(2) { grid-area: b; } .face-6 .pip:nth-child(3) { grid-area: c; } .face-6 .pip:nth-child(4) { grid-area: e; } .face-6 .pip:nth-child(5) { grid-area: f; } .face-6 .pip:nth-child(6) { grid-area: g; }
    </style>
</head>
<body>

    <div class="main-container">
        <img src="https://raw.githubusercontent.com/calebkatz874-bot/images/main/FLOURISH.png" alt="Flourish" class="logo-image">

        <button class="reset-btn" onclick="resetGame()">Reset Board</button>

        <div class="pos-display">
            <div class="adjust-btn" onclick="manualAdjust(-1)">−</div>
            <div id="position-text" class="font-bold">Spot: 0</div>
            <div class="adjust-btn" onclick="manualAdjust(1)">+</div>
        </div>

        <div id="message-box">Tap to roll!</div>

        <div class="scene" id="dice-scene">
            <div id="dice" class="cube">
                <div class="cube__face face-1"><span class="pip"></span></div>
                <div class="cube__face face-2"><span class="pip"></span><span class="pip"></span></div>
                <div class="cube__face face-3"><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
                <div class="cube__face face-4"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
                <div class="cube__face face-5"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
                <div class="cube__face face-6"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
            </div>
        </div>
    </div>

    <script>
        const dice = document.getElementById('dice');
        const diceScene = document.getElementById('dice-scene');
        const msgBox = document.getElementById('message-box');
        const posText = document.getElementById('position-text');

        let playerPosition = parseInt(localStorage.getItem('flourish_pos')) || 0;
        posText.textContent = `Spot: ${playerPosition}`;

        let currentX = 0, currentY = 0, isRolling = false;
        const MAX_SPOTS = 20;

        function sendHoverlay(msg) {
            window.location.href = `space://do?action=send_event&event_message=${msg}`;
        }

        function manualAdjust(amt) {
            playerPosition = Math.max(0, Math.min(MAX_SPOTS, playerPosition + amt));
            localStorage.setItem('flourish_pos', playerPosition);
            posText.textContent = `Spot: ${playerPosition}`;
            sendHoverlay(`spot-${playerPosition}`);
        }

        const faceRotations = { 1:{x:0, y:0}, 2:{x:0, y:-90}, 3:{x:0, y:-180}, 4:{x:0, y:90}, 5:{x:-90, y:0}, 6:{x:90, y:0} };

        function rollDice() {
            if (isRolling) return;
            isRolling = true;
            const result = Math.floor(Math.random() * 6) + 1;
            
            playerPosition = Math.min(MAX_SPOTS, playerPosition + result);
            localStorage.setItem('flourish_pos', playerPosition);

            const spinsX = (Math.floor(Math.random() * 4) + 5) * 360;
            const spinsY = (Math.floor(Math.random() * 4) + 5) * 360;
            currentX += spinsX + faceRotations[result].x - (currentX % 360);
            currentY += spinsY + faceRotations[result].y - (currentY % 360);
            dice.style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg)`;

            setTimeout(() => {
                msgBox.textContent = `You rolled a ${result}!`;
                posText.textContent = `Spot: ${playerPosition}`;
                isRolling = false;
                sendHoverlay(`dice-${result}`);
                setTimeout(() => sendHoverlay(`spot-${playerPosition}`), 600);
            }, 1800);
        }

        function resetGame() {
            if (confirm("Reset to Start?")) {
                playerPosition = 0;
                localStorage.setItem('flourish_pos', 0);
                posText.textContent = `Spot: 0`;
                msgBox.textContent = "Board Reset!";
                sendHoverlay('game-reset');
            }
        }

        diceScene.addEventListener('click', rollDice);
    </script>
</body>
</html>
