<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flourish Dice Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --dice-size: 100px;
            --pip-size: 18px;
            --flourish-green: #C1FF72;
            --flourish-pink: #FF66C4;
        }

        body {
            background: #05472A;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 1rem;
            user-select: none;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .logo-image {
            max-width: 450px;
            width: 85%;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        /* 3D Dice Styling */
        .scene {
            width: var(--dice-size);
            height: var(--dice-size);
            perspective: 600px;
            margin: 40px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .scene:hover { transform: scale(1.1); }
        .scene:active { transform: scale(0.95); }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.8s cubic-bezier(0.2, 0.8, 0.3, 1);
        }

        .cube__face {
            position: absolute;
            width: var(--dice-size);
            height: var(--dice-size);
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            display: grid;
            grid-template-areas: "a . b" "c d e" "f . g";
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 12px;
            box-sizing: border-box;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
            backface-visibility: hidden;
        }

        .pip {
            display: block; width: var(--pip-size); height: var(--pip-size);
            border-radius: 50%; background-color: #1e293b;
            box-shadow: inset 0 3px 3px rgba(0,0,0,0.4);
            justify-self: center; align-self: center;
        }

        .face-1 { transform: rotateY(0deg) translateZ(50px); }
        .face-2 { transform: rotateY(90deg) translateZ(50px); }
        .face-3 { transform: rotateY(180deg) translateZ(50px); }
        .face-4 { transform: rotateY(-90deg) translateZ(50px); }
        .face-5 { transform: rotateX(90deg) translateZ(50px); }
        .face-6 { transform: rotateX(-90deg) translateZ(50px); }

        .face-1 .pip { grid-area: d; }
        .face-2 .pip:nth-child(1) { grid-area: a; } .face-2 .pip:nth-child(2) { grid-area: g; }
        .face-3 .pip:nth-child(1) { grid-area: a; } .face-3 .pip:nth-child(2) { grid-area: d; } .face-3 .pip:nth-child(3) { grid-area: g; }
        .face-4 .pip:nth-child(1) { grid-area: a; } .face-4 .pip:nth-child(2) { grid-area: b; } .face-4 .pip:nth-child(3) { grid-area: f; } .face-4 .pip:nth-child(4) { grid-area: g; }
        .face-5 .pip:nth-child(1) { grid-area: a; } .face-5 .pip:nth-child(2) { grid-area: b; } .face-5 .pip:nth-child(3) { grid-area: d; } .face-5 .pip:nth-child(4) { grid-area: f; } .face-5 .pip:nth-child(5) { grid-area: g; }
        .face-6 .pip:nth-child(1) { grid-area: a; } .face-6 .pip:nth-child(2) { grid-area: b; } .face-6 .pip:nth-child(3) { grid-area: c; } .face-6 .pip:nth-child(4) { grid-area: e; } .face-6 .pip:nth-child(5) { grid-area: f; } .face-6 .pip:nth-child(6) { grid-area: g; }

        /* UI Styling */
        #status-container { text-align: center; }
        #message-box { font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        
        .pos-display {
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .adjust-btn {
            background: rgba(255, 255, 255, 0.2);
            width: 35px; height: 35px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem;
            cursor: pointer; transition: 0.2s;
        }
        .adjust-btn:active { background: var(--flourish-green); color: black; }

        .reset-btn {
            margin-top: 25px;
            padding: 10px 25px;
            background-color: var(--flourish-pink);
            color: white;
            border-radius: 99px;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 0 #b33a80;
        }
        .reset-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b33a80; }
    </style>
</head>
<body class="p-4">

    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/calebkatz874-bot/images/main/FLOURISH.png" alt="Flourish Dice" class="logo-image">
    </div>

    <div class="scene" id="dice-scene">
        <div id="dice" class="cube">
            <div class="cube__face face-1"><span class="pip"></span></div>
            <div class="cube__face face-2"><span class="pip"></span><span class="pip"></span></div>
            <div class="cube__face face-3"><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
            <div class="cube__face face-4"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
            <div class="cube__face face-5"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
            <div class="cube__face face-6"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
        </div>
    </div>

    <div id="status-container" class="flex flex-col items-center">
        <div id="message-box" class="text-2xl mb-2">Tap dice to roll!</div>
        
        <div class="pos-display">
            <div class="adjust-btn" onclick="manualAdjust(-1)">−</div>
            <div id="position-text">Spot: 0</div>
            <div class="adjust-btn" onclick="manualAdjust(1)">+</div>
        </div>

        <button class="reset-btn" onclick="resetGame()">Reset Board</button>
    </div>

    <script>
        const dice = document.getElementById('dice');
        const diceScene = document.getElementById('dice-scene');
        const msgBox = document.getElementById('message-box');
        const posText = document.getElementById('position-text');

        let currentX = 0;
        let currentY = 0;
        let isRolling = false;
        const MAX_SPOTS = 20;

        // --- LOAD POSITION ---
        function getStoredPos() {
            const saved = localStorage.getItem('flourish_current_pos');
            return saved ? parseInt(saved, 10) : 0;
        }

        let playerPosition = getStoredPos();
        posText.textContent = `Spot: ${playerPosition}`;

        // --- HOVERLAY HANDSHAKE ---
        function sendHoverlay(message) {
            console.log("Sending to Hoverlay: " + message);
            window.location.href = `space://do?action=send_event&event_message=${message}`;
        }

        // --- MANUAL OVERRIDE ---
        function manualAdjust(amount) {
            playerPosition += amount;
            if (playerPosition < 0) playerPosition = 0;
            if (playerPosition > MAX_SPOTS) playerPosition = MAX_SPOTS;
            
            localStorage.setItem('flourish_current_pos', playerPosition);
            posText.textContent = `Spot: ${playerPosition}`;
            sendHoverlay(`spot-${playerPosition}`);
        }

        const faceRotations = {
            1: { x: 0, y: 0 }, 2: { x: 0, y: -90 }, 3: { x: 0, y: -180 },
            4: { x: 0, y: 90 }, 5: { x: -90, y: 0 }, 6: { x: 90, y: 0 }
        };

        function rollDice() {
            if (isRolling) return;
            
            // Re-sync with storage
            playerPosition = getStoredPos();
            isRolling = true;
            
            const result = Math.floor(Math.random() * 6) + 1;
            playerPosition += result;
            if (playerPosition > MAX_SPOTS) playerPosition = MAX_SPOTS;
            
            // Save immediately
            localStorage.setItem('flourish_current_pos', playerPosition);

            msgBox.textContent = "Rolling...";
            const spinsX = (Math.floor(Math.random() * 4) + 5) * 360;
            const spinsY = (Math.floor(Math.random() * 4) + 5) * 360;

            currentX += spinsX + faceRotations[result].x - (currentX % 360);
            currentY += spinsY + faceRotations[result].y - (currentY % 360);
            dice.style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg)`;

            setTimeout(() => {
                msgBox.textContent = `You rolled a ${result}!`;
                posText.textContent = `Spot: ${playerPosition}`;
                isRolling = false;

                // 1. Notify Hoverlay of the result (Sound Trigger)
                sendHoverlay(`dice-${result}`);

                // 2. Notify Hoverlay of the landing spot (Visual/Animation Trigger)
                setTimeout(() => {
                    sendHoverlay(`spot-${playerPosition}`);
                }, 600);
                
            }, 1800);
        }

        function resetGame() {
            if (confirm("Reset game to Start?")) {
                localStorage.setItem('flourish_current_pos', 0);
                playerPosition = 0;
                posText.textContent = `Spot: 0`;
                msgBox.textContent = "Board Reset!";
                sendHoverlay('game-reset');
            }
        }

        diceScene.addEventListener('click', rollDice);
    </script>
</body>
</html>
